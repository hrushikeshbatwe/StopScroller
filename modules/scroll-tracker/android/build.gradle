plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.scrolltracker'
version = '0.1.0'

android {
  namespace "expo.modules.scrolltracker"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  // Nothing Glyph Matrix SDK — drop glyph-matrix-sdk-2.0.aar into ./libs (see libs/README.md).
  // Only needed for the Phone (3) Glyph Toy; the rest of the module builds without it.
  implementation fileTree(dir: "libs", include: ["*.aar"])
}
